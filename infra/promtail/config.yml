server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
    pipeline_stages:
      - docker: {}
      # API only: parse Pino JSON lines without dropping non-JSON (e.g. npm notices).
      - match:
          selector: '{compose_service="api"}'
          stages:
            - regex:
                expression: '"scenario":"(?P<scenario>[^"]*)"'
            - labels:
                scenario:
            - regex:
                expression: '"level":(?P<level>[0-9]+)'
            - labels:
                level:
